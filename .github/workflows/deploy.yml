name: deploy

# Auto-deploy on merge to main. The simplified Pass-1 flow: build+push ONE image (the silo) to Docker Hub,
# then `pulumi up` the minimal program (RG, Storage, Azure OpenAI, monitoring, ACA env + silo).
on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      image_tag:
        description: 'Container image tag to build and deploy'
        required: false
        default: 'latest'

permissions:
  id-token: write
  contents: read
  packages: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      TAG: "${{ inputs.image_tag || github.sha }}"
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '11.0.x'

      - name: Run tests
        run: dotnet test DigitalBrain.Tests/DigitalBrain.Tests.csproj -c Release

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ vars.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Publish silo image
        run: |
          dotnet publish DigitalBrain.Silo/DigitalBrain.Silo.csproj -c Release /t:PublishContainer \
            -p:ContainerRegistry=docker.io \
            -p:ContainerRepository=vhorbachov/digitalbrain-silo \
            -p:ContainerImageTag="${TAG}"

      - name: Azure login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ vars.AZURE_CLIENT_ID }}
          tenant-id: ${{ vars.AZURE_TENANT_ID }}
          subscription-id: ${{ vars.AZURE_SUBSCRIPTION_ID }}

      - name: Provision (pulumi up)
        uses: pulumi/actions@v6
        env:
          PULUMI_CONFIG_PASSPHRASE: ${{ secrets.PULUMI_PASSPHRASE }}
          DIGITALBRAIN_IMAGE_TAG: "${{ env.TAG }}"
        with:
          command: up
          stack-name: dev
          work-dir: deploy
          cloud-url: azblob://pulumi-state

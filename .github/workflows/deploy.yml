name: deploy

# Manual until the first successful deploy (Task 10), then flip to push:[main] for auto-deploy.
on:
  workflow_dispatch:
    inputs:
      image_tag:
        description: 'Container image tag to build and deploy'
        required: false
        default: 'latest'

permissions:
  id-token: write
  contents: read
  packages: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      TAG: "${{ inputs.image_tag }}"
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '11.0.x'

      - name: Run tests
        run: dotnet test DigitalBrain.Tests/DigitalBrain.Tests.csproj -c Release

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Publish container images
        run: |
          publish() {
            dotnet publish "$1/$1.csproj" -c Release /t:PublishContainer \
              -p:ContainerRegistry=ghcr.io \
              -p:ContainerRepository="digitalbraintech/$2" \
              -p:ContainerImageTag="${TAG}"
          }
          publish DigitalBrain.Silo    digitalbrain-silo
          publish DigitalBrain.Gateway digitalbrain-gateway
          publish DigitalBrain.Mcp     digitalbrain-mcp

      - name: Azure login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ vars.AZURE_CLIENT_ID }}
          tenant-id: ${{ vars.AZURE_TENANT_ID }}
          subscription-id: ${{ vars.AZURE_SUBSCRIPTION_ID }}

      - name: Provision and deploy
        env:
          PULUMI_CONFIG_PASSPHRASE: ${{ secrets.PULUMI_PASSPHRASE }}
        run: |
          pulumi login azblob://pulumi-state
          dotnet run --project deploy/DigitalBrain.Deploy.csproj -- --image-tag "${TAG}"

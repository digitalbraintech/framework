name: ci

on:
  pull_request:
  push:
    branches-ignore: [master]

jobs:
  build-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '11.0.x'

      - run: dotnet build Brain.slnx -c Release

      # E2E specs need the full Aspire stack (Ollama + replicas) + Playwright and are gated out of headless CI,
      # mirroring the documented "DigitalBrain.Tests excluding gated E2E" verification.
      - run: dotnet test DigitalBrain.Tests/DigitalBrain.Tests.csproj -c Release --filter "FullyQualifiedName!~E2E"

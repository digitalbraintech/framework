name: ci

on:
  pull_request:
  push:
    branches-ignore: [master]

jobs:
  build-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '11.0.x'

      - run: dotnet build NeuroOS.slnx -c Release

      - run: dotnet test DigitalBrain.Tests/DigitalBrain.Tests.csproj -c Release
